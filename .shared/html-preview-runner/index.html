<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Preview Runner</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .runner-status {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .runner-card {
      max-width: 760px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    .runner-card h1 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .runner-card p {
      margin: 8px 0;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .runner-card code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(148, 163, 184, 0.15);
      color: #f8fafc;
    }
  </style>
</head>
<body>
  <div class="runner-status">
    <div class="runner-card">
      <h1>正在启动 HTML 预览…</h1>
      <p>如果长时间停留在此页，请确认预览数据是否成功传入。</p>
    </div>
  </div>

  <script src="./runner.js"></script>
</body>
</html>
